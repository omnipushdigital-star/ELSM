<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ELSM Dashboard – CBIC · DGGI · BSNL</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* CBIC Primary Palette */
  --navy:#1a237e;
  --navy2:#283593;
  --navy3:#3949ab;
  --navy-light:#e8eaf6;
  --navy-xlight:#f3f4fb;
  /* Saffron accent (India flag) */
  --saffron:#e65100;
  --saffron2:#f57c00;
  --saffron-light:#fff3e0;
  /* Teal/green (GoI portal buttons) */
  --teal:#00695c;
  --teal2:#00897b;
  --teal-light:#e0f2f1;
  /* Neutrals */
  --bg:#f5f6fa;
  --bg-white:#ffffff;
  --border:#d0d5e8;
  --border2:#b0bcd8;
  --text:#1a1a2e;
  --text2:#3d3d5c;
  --text3:#6e6e8a;
  --text-light:#9999b3;
  /* Semantic */
  --green:#2e7d32;
  --green-light:#e8f5e9;
  --amber:#e65100;
  --amber-light:#fff3e0;
  --red:#c62828;
  --red-light:#ffebee;
  --blue:#1565c0;
  --blue-light:#e3f2fd;
  --font:'Noto Sans',sans-serif;
  --mono:'Noto Sans Mono',monospace;
  --r:6px;
  --r2:8px;
  --shadow:0 1px 4px rgba(26,35,126,.1);
  --shadow2:0 2px 8px rgba(26,35,126,.14);
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;overflow-x:hidden}
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto auto 1fr;min-height:100vh}

/* ── GOI Top Strip ── */
.goi-strip{grid-column:1/-1;background:var(--navy);color:#fff;padding:0 24px;height:36px;display:flex;align-items:center;gap:16px;font-size:11px;letter-spacing:.02em}
.goi-strip-logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:12px}
.goi-emblem{width:26px;height:26px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--navy);font-weight:900;line-height:1}
.goi-sep{width:1px;height:18px;background:rgba(255,255,255,.3)}
.goi-strip-right{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:11px}
.goi-strip-right a{color:rgba(255,255,255,.8);text-decoration:none}
.goi-strip-right a:hover{color:#fff}

/* ── Header ── */
.header{grid-column:1/-1;background:var(--bg-white);border-bottom:3px solid var(--saffron);padding:0 24px;height:68px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow2)}
.header-brand{display:flex;align-items:center;gap:14px}
.header-logo-block{display:flex;flex-direction:column}
.header-title{font-size:17px;font-weight:700;color:var(--navy);letter-spacing:-.2px;line-height:1.2}
.header-subtitle{font-size:11px;color:var(--text3);font-weight:500}
.cbic-logo{width:48px;height:48px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:1.2;letter-spacing:.5px;flex-shrink:0}
.header-divider{width:1px;height:40px;background:var(--border)}
.portal-name{display:flex;flex-direction:column}
.portal-name-main{font-size:15px;font-weight:700;color:var(--saffron);letter-spacing:-.1px}
.portal-name-sub{font-size:11px;color:var(--text3)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.badge-live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:600;padding:4px 10px;background:var(--green-light);border-radius:20px;border:1px solid #a5d6a7}
.dot-live{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;background:var(--bg);transition:background .15s}
.user-pill:hover{background:var(--navy-light)}
.avatar{width:30px;height:30px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.time-chip{font-family:var(--mono);font-size:11px;color:var(--navy);background:var(--navy-light);padding:4px 10px;border-radius:var(--r);border:1px solid var(--border)}

/* ── Sidebar ── */
.sidebar{background:var(--bg-white);border-right:1px solid var(--border);padding:0;display:flex;flex-direction:column;overflow-y:auto;box-shadow:1px 0 4px rgba(26,35,126,.06)}
.nav-section{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.1em;padding:14px 16px 6px;border-bottom:1px solid var(--navy-light)}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:12.5px;font-weight:500;transition:all .12s;border-left:3px solid transparent;position:relative}
.nav-item:hover{background:var(--navy-xlight);color:var(--navy)}
.nav-item.active{background:var(--navy-light);color:var(--navy);font-weight:700;border-left-color:var(--saffron)}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:.65}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);background:var(--navy-xlight)}

/* ── Main ── */
.main{overflow-y:auto;padding:20px 24px;background:var(--bg)}
.page-header{margin-bottom:18px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-bottom:6px}
.breadcrumb span{color:var(--border2)}
.breadcrumb a{color:var(--navy);text-decoration:none}
.page-title{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.3px;margin-bottom:3px}
.page-subtitle{font-size:12px;color:var(--text3)}

/* ── Card ── */
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r2);padding:18px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title-action{font-size:11px;font-weight:600;color:var(--teal);cursor:pointer}

/* ── KPI Grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px 12px;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;border-top:3px solid var(--kpi-accent,var(--navy))}
.kpi:hover{box-shadow:var(--shadow2);border-color:var(--kpi-accent,var(--navy3))}
.kpi-label{font-size:10.5px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;margin-bottom:4px;font-family:var(--mono);color:var(--navy)}
.kpi-change{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:500}
.kpi-change.up{color:var(--green)}
.kpi-change.down{color:var(--red)}
.kpi-change.neutral{color:var(--text3)}

/* ── Grids ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-65{display:grid;grid-template-columns:2fr 1fr;gap:14px}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;font-weight:700;font-size:10.5px;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;background:var(--navy-light);border-bottom:2px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--navy-xlight)}
tr:last-child td{border-bottom:none}

/* ── Pills / Status ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:3px;font-size:10.5px;font-weight:600;letter-spacing:.02em}
.pill::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pill.online{background:var(--green-light);color:var(--green)}.pill.online::before{background:var(--green)}
.pill.offline{background:var(--red-light);color:var(--red)}.pill.offline::before{background:var(--red)}
.pill.charging{background:var(--amber-light);color:var(--amber)}.pill.charging::before{background:var(--amber)}
.pill.sealed{background:var(--blue-light);color:var(--blue)}.pill.sealed::before{background:var(--blue)}
.pill.breach{background:var(--red-light);color:var(--red);animation:pill-flash 1.5s infinite}.pill.breach::before{background:var(--red)}
@keyframes pill-flash{0%,100%{opacity:1}50%{opacity:.55}}

/* ── Alert cards ── */
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:var(--r);border-left:4px solid;margin-bottom:8px}
.alert.critical{background:#fff8f8;border-color:var(--red)}
.alert.warning{background:var(--amber-light);border-color:var(--saffron)}
.alert.info{background:var(--blue-light);border-color:var(--blue)}
.alert-title{font-weight:700;font-size:12px;margin-bottom:2px;color:var(--text)}
.alert-body{font-size:11.5px;color:var(--text2);line-height:1.5}
.alert-time{font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap;margin-top:2px}

/* ── Progress ── */
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}

/* ── Section ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:13px;font-weight:700;color:var(--navy)}
.section-action{font-size:11px;color:var(--teal);cursor:pointer;font-weight:600}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filter-btn{padding:5px 12px;border-radius:3px;font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text2);transition:all .12s;font-family:var(--font)}
.filter-btn:hover{border-color:var(--navy3);color:var(--navy)}
.filter-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.search-input{padding:6px 12px;border-radius:var(--r);border:1px solid var(--border);background:#fff;color:var(--text);font-family:var(--font);font-size:12px;outline:none;transition:border .12s;margin-left:auto}
.search-input:focus{border-color:var(--navy3)}
.search-input::placeholder{color:var(--text-light)}

/* ── Chip ── */
.chip{display:inline-flex;align-items:center;background:var(--navy-light);border:1px solid var(--border);border-radius:3px;padding:1px 7px;font-size:10.5px;font-family:var(--mono);color:var(--navy);font-weight:600}

/* ── Chart ── */
.chart-wrap{position:relative;width:100%}

/* ── Map grid ── */
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.map-city{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all .12s}
.map-city:hover{border-color:var(--navy3);background:var(--navy-xlight)}
.map-city-name{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-city-count{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--text)}
.map-city-sla{font-size:10px;margin-top:2px;font-family:var(--mono)}

/* ── Buttons ── */
.btn-primary{padding:8px 18px;border-radius:var(--r);border:none;background:var(--navy);color:#fff;cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600;transition:background .12s}
.btn-primary:hover{background:var(--navy2)}
.btn-teal{padding:8px 18px;border-radius:var(--r);border:none;background:var(--teal);color:#fff;cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600}
.btn-teal:hover{background:var(--teal2)}
.btn-outline{padding:7px 16px;border-radius:var(--r);border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500}
.btn-outline:hover{border-color:var(--navy);color:var(--navy)}

/* ── Form elements ── */
.form-label{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.form-input{width:100%;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border);background:#fff;color:var(--text);font-family:var(--font);font-size:12.5px;outline:none;transition:border .12s}
.form-input:focus{border-color:var(--navy3);box-shadow:0 0 0 2px rgba(57,73,171,.12)}
.form-select{width:100%;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border);background:#fff;color:var(--text);font-family:var(--font);font-size:12.5px;outline:none;cursor:pointer}
.form-textarea{width:100%;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border);background:#fff;color:var(--text);font-family:var(--font);font-size:12.5px;resize:vertical;min-height:72px;outline:none}
.form-group{margin-bottom:14px}

/* ── Info box ── */
.info-box{background:var(--blue-light);border:1px solid #90caf9;border-radius:var(--r);padding:11px 13px;font-size:11.5px;color:var(--blue);line-height:1.6}
.warning-box{background:var(--amber-light);border:1px solid #ffcc80;border-radius:var(--r);padding:11px 13px;font-size:11.5px;color:var(--amber);line-height:1.6}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.animate-in{animation:fadeIn .25s ease both}
.stagger-1{animation-delay:.04s}.stagger-2{animation-delay:.08s}.stagger-3{animation-delay:.12s}.stagger-4{animation-delay:.16s}

/* ── Success banner ── */
.success-banner{background:var(--green-light);border:1px solid #a5d6a7;border-left:4px solid var(--green);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Responsive ── */
@media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-65{grid-template-columns:1fr}}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.grid-2{grid-template-columns:1fr}}
</style>
</head>

function LineChart({labels,datasets}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:'line',data:{labels,datasets:datasets.map(d=>({...d,tension:.4,pointRadius:4,pointHoverRadius:6,borderWidth:2}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a237e',borderColor:'#3949ab',borderWidth:1,titleColor:'#fff',bodyColor:'#c5cae9'}},scales:{x:{grid:{color:'rgba(26,35,126,.08)',drawTicks:false},ticks:{color:'#6e6e8a',font:{size:11}}},y:{grid:{color:'rgba(26,35,126,.08)',drawTicks:false},ticks:{color:'#6e6e8a',font:{size:11}},beginAtZero:true}}}});
    return()=>chartRef.current?.destroy();
  },[]);
  return <div className="chart-wrap" style={{height:190}}><canvas ref={ref}/></div>;
}

  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:'bar',data:{labels,datasets:[{data,backgroundColor:color||'rgba(26,35,126,.2)',borderColor:color||'rgba(26,35,126,.6)',borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a237e',borderColor:'#3949ab',borderWidth:1,titleColor:'#fff',bodyColor:'#c5cae9'}},scales:{x:{grid:{display:false},ticks:{color:'#6e6e8a',font:{size:11}}},y:{grid:{color:'rgba(26,35,126,.08)',drawTicks:false},ticks:{color:'#6e6e8a',font:{size:11}}}}}});
    return()=>chartRef.current?.destroy();
  },[]);
  return <div className="chart-wrap" style={{height:150}}><canvas ref={ref}/></div>;
}

function SLAGauge({value}){
  const r=64,cx=84,cy=84,stroke=9,circ=2*Math.PI*r,arc=circ*.75,fill=arc*(value/100);
  const color=value>=99.5?'#2e7d32':value>=98?'#e65100':'#c62828';
  return(
    <svg width="168" height="120" viewBox="0 0 168 120">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e8eaf6" strokeWidth={stroke} strokeDasharray={`${arc} ${circ}`} strokeDashoffset={-circ*.125} strokeLinecap="round"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${fill} ${circ}`} strokeDashoffset={-circ*.125} strokeLinecap="round" style={{transition:'stroke-dasharray .8s'}}/>
      <text x={cx} y={cx-4} textAnchor="middle" fill={color} fontFamily="'Noto Sans Mono'" fontSize="20" fontWeight="700">{value}%</text>
      <text x={cx} y={cx+14} textAnchor="middle" fill="#6e6e8a" fontFamily="'Noto Sans'" fontSize="10">Uptime SLA</text>
      <text x="16" y="112" fill="#9999b3" fontFamily="'Noto Sans'" fontSize="9">0%</text>
      <text x="140" y="112" fill="#9999b3" fontFamily="'Noto Sans'" fontSize="9">100%</text>
    </svg>
  );
}

function KPI({label,value,change,changeDir,accent,delay}){

          ))}</tbody>
        </table></div>}

        {tab==='officers'&&<div className="table-wrap"><table>
          <thead><tr><th>Officer ID</th><th>Name</th><th>Code</th><th>Designation</th><th>Mobile</th><th>Email</th><th>Hierarchy</th></tr></thead>
          <tbody>{filt(OFFICERS,['id','name','code','desig','email']).map(r=>(
            <tr key={r.id}>
              <td><span className="chip">{r.id}</span></td>
              <td style={{fontWeight:600,color:'var(--navy)'}}>{r.name}</td>
              <td style={{fontFamily:'var(--mono)',fontSize:11}}>{r.code}</td>
              <td style={{color:'var(--text2)'}}>{r.desig}</td>
              <td style={{fontFamily:'var(--mono)',fontSize:11}}>{r.mob}</td>
              <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--teal)'}}>{r.email}</td>
              <td><span className="chip" style={{background:'var(--navy-light)',color:'var(--navy)'}}>{r.hid}</span></td>
            </tr>
          ))}</tbody>
        </table></div>}

        <div style={{marginTop:10,fontSize:11,color:'var(--text3)'}}>GST Sync API (POST /api/v1/master-data/push) - mock data active - set GST_SYNC_MOCK=False in .env to use live API</div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('dashboard');
  const [time,setTime]=useState(new Date());
  const [user,setUser]=useState(null);
  const [tickets,setTickets]=useState(()=>{
    try{const s=localStorage.getItem('elsm_tickets_v2');if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length)return p;}}catch(e){}
    return INITIAL_TICKETS;
  });
  useEffect(()=>{try{localStorage.setItem('elsm_tickets_v2',JSON.stringify(tickets));}catch(e){};},[tickets]);
  useEffect(()=>{
    const t=setInterval(()=>setTime(new Date()),1000);
    try{const s=localStorage.getItem('elsm_user');if(s)setUser(JSON.parse(s));}catch(e){}
    return()=>clearInterval(t);
  },[]);
  const handleLogin=(u)=>{setUser(u);try{localStorage.setItem('elsm_user',JSON.stringify(u));}catch(e){}};
  const handleLogout=()=>{if(!confirm('Sign out of ELSM Portal?'))return;setUser(null);try{localStorage.removeItem('elsm_user');}catch(e){}};
  if(!user) return <LoginScreen onLogin={handleLogin}/>;
  function renderPage(page,user,tickets,setTickets){
    if(page==='dashboard') return React.createElement(Dashboard,{user,tickets});
    if(page==='locks') return React.createElement(LockInventory,null);
    if(page==='events') return React.createElement(EventsPage,null);
    if(page==='alerts') return React.createElement(AlertsPage,null);
    if(page==='map') return React.createElement(ZoneCoverage,null);
    if(page==='sla') return React.createElement(SLAReports,null);
    if(page==='dggi') return React.createElement(DGGITickets,{tickets,setTickets,user});
    if(page==='gst') return React.createElement(GSTMasterData,null);
    return React.createElement(Dashboard,{user,tickets});
  }
  return(
    <div className="app">
      <GOIStrip/>
      <Header time={time} user={user} onLogout={handleLogout}/>
      <Sidebar active={page} setActive={setPage}/>
      <div className="main">{renderPage(page,user,tickets,setTickets)||<Dashboard/>}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
