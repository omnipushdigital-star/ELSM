version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: elsm_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elsm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elsm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-elsm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elsm_user -d elsm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: elsm_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: elsm_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-elsm_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-elsm_minio_pass}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elsm_backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elsm_celery
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - db
    command: celery -A app.core.celery_app worker --loglevel=info

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elsm_celery_beat
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - db
    command: celery -A app.core.celery_app beat --loglevel=info

volumes:
  postgres_data:
  minio_data:
